        body{background-color:var(--page-bg);font-family:'Lato',serif}.main-subtitle{color:var(--text-color)}.customize-container{max-width:625px;margin:0 auto 2rem auto}.customize-container .btn{font-size:1.5rem;display:flex;justify-content:space-between;align-items:center;background-color:var(--highlight-color);border-color:var(--highlight-color);transition:background-color .2s}.customize-container .btn:hover{background-color:#2B37A1;border-color:#2B37A1}.toggle-controls{background-color:var(--card-bg);padding:1rem;border-radius:.5rem;box-shadow:0 2px 4px rgba(0,0,0,.1)}.toggle-controls .form-check-label,.toggle-controls .form-label{font-size:1.5rem}.toggle-controls .form-switch{min-height:2.25rem;padding-left:3.5em}.toggle-controls .form-check-input{width:2.5em;height:1.25em;margin-left:-3.5em}.subject-header{background-color:var(--header-bg);color:var(--header-text);padding:1rem;margin-top:2rem;margin-bottom:1.5rem;border-radius:.5rem;text-align:center}.flip-card{background-color:transparent;width:100%;height:280px;min-height:280px;perspective:1000px;margin-bottom:1.5rem;cursor:pointer;transition:height .35s ease-in-out}.flip-card-inner{position:relative;width:100%;height:100%;text-align:center;transition:transform .6s;transform-style:preserve-3d;box-shadow:0 4px 8px 0 rgba(0,0,0,.2);border-radius:.5rem}.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}.flip-card-front,.flip-card-back{position:absolute;width:100%;height:100%;-webkit-backface-visibility:hidden;backface-visibility:hidden;border-radius:.5rem;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:25px;transition:opacity .3s ease-in-out}.flip-card-front{background-color:var(--card-bg);color:var(--text-color);overflow:hidden}.flip-card-back{background-color:var(--card-bg);color:var(--text-color);transform:rotateY(180deg);overflow-y:auto;justify-content:center}.rule-name{font-weight:bold;font-size:1.25rem}.rule-percentage{font-size:1.5rem;color:var(--highlight-color);font-weight:bold;margin-top:.5rem}.back-card-title{display:none;font-weight:bold;font-size:1.25rem;color:var(--highlight-color);margin-bottom:1rem;border-bottom:1px solid #DEE2E6;padding-bottom:.75rem;width:100%}.flip-card.zoomed .back-card-title{display:block}.rule-statement{font-size:1.1rem;text-align:left;width:100%}.text-justify .rule-statement{text-align:justify}.zoom-icon{position:absolute;bottom:15px;width:21px;height:21px;color:var(--text-color);transition:color .2s,transform .2s;z-index:5}.zoom-icon:hover{color:var(--highlight-color);transform:scale(1.5)}.filter-pills{display:flex;flex-wrap:wrap;justify-content:center;gap:.75rem;margin-bottom:2.5rem}.filter-pill{background-color:var(--pill-bg);border:1px solid #DEE2E6;color:var(--pill-text);padding:.5rem 1.25rem;font-size:1.1rem;font-weight:bold;transition:background-color .2s,color .2s,border-color .2s}.filter-pill.active{background-color:var(--highlight-color);color:white;border-color:var(--highlight-color)}.filter-pill:not(.active):hover{background-color:var(--highlight-color);color:white;border-color:var(--highlight-color)}.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:999;opacity:0;visibility:hidden;transition:opacity .4s ease}.overlay.active{opacity:1;visibility:visible}.flip-card.zoomed{position:fixed;top:50%;left:50%;width:40vw;height:50vh;min-width:500px;min-height:400px;transform:translate(-50%,-50%) scale(1.5);z-index:1000}.flip-card.zoomed .flip-card-inner{transform:none}.flip-card.zoomed .flip-card-front{opacity:0}.flip-card.zoomed .flip-card-back{transform:rotateY(0deg);-webkit-backface-visibility:visible;backface-visibility:visible}.zoom-off .zoom-icon{display:none}.more-info-link-wrapper{display:none;text-align:center;width:100%}.info-on .more-info-link-wrapper{display:block}.parenthetical{display:none;font-weight:bold;color:#781927;}.parentheticals-on .parenthetical{display:inline}.collapse-icon svg{width:24px;height:24px}.btn .icon-up{display:none}.btn.collapsed .icon-up{display:none}.btn.collapsed .icon-down{display:inline-block}.btn:not(.collapsed) .icon-down{display:none}.btn:not(.collapsed) .icon-up{display:inline-block}.card-category{position:absolute;top:10px;left:0;right:0;font-size:.8rem;font-weight:700;color:var(--pill-text);text-transform:uppercase;letter-spacing:.5px;text-align:center}.flip-card.flipped .zoom-icon{pointer-events:none;}@media (max-width:767px){.zoom-icon{display:none!important}.flip-card.zoomed{position:static;width:100%;height:280px;min-width:unset;min-height:unset;transform:none;z-index:auto}.overlay.active{display:none}}

        <!-- Data for All Topics -->
        <script>
            const rulesData = {
                "Business Associations": [
                    { name: "Authority of Agent to Bind Principal", percentage: "24.1%", statement: "An agent has the authority to bind a principal to a contract when the agent acts with actual or apparent authority. Actual authority can be express <span class='parenthetical'>(created by the principal's explicit words to the agent)</span> or implied <span class='parenthetical'>(based on the agent's reasonable understanding of the principal's objectives)</span>.", link: "https://www.law.cornell.edu/wex/agency" },
                    { name: "Apparent Authority", percentage: "24.1%", statement: "Apparent authority arises when a third party reasonably believes the agent has authority to act on behalf of the principal, and that belief is traceable to the principal's manifestations <span class='parenthetical'>(outward expressions or signs)</span>.", link: "https://www.law.cornell.edu/wex/apparent_authority" },
                    { name: "Contract Liability of the Partnership", percentage: "20.4%", statement: "A partnership is liable for contracts entered into on its behalf by a partner with authority to act for the partnership.", link: "https://www.law.cornell.edu/wex/partnership" },
                    { name: "Dissolution of the Partnership", percentage: "18.5%", statement: "Dissolution of a partnership is the commencement of the winding-up <span class='parenthetical'>(liquidating assets and settling debts)</span> process. Events that can cause dissolution include the express will of a partner to withdraw, the expiration of the term of the partnership, or the agreement of the partners.", link: "https://www.law.cornell.edu/wex/dissolution" },
                    { name: "Business Judgment/Duty of Care", percentage: "18.5%", statement: "The business judgment rule protects a corporation's directors from liability for their decisions if they acted on an informed basis, in good faith, and in the honest belief that the action was in the best interests of the company. A director has a duty to act with the care that a person in a like position would reasonably believe appropriate under similar circumstances.", link: "https://www.law.cornell.edu/wex/business_judgment_rule" },
                    { name: "Shareholder Derivative Claims", percentage: "14.8%", statement: "A shareholder may bring a derivative claim <span class='parenthetical'>(a lawsuit brought by a shareholder on behalf of the corporation)</span> against a third party <span class='parenthetical'>(often a director)</span> for harm suffered by the corporation. The shareholder must have been a shareholder at the time of the wrongful act, must fairly and adequately represent the interests of the corporation, and must first make a written demand on the board of directors to take action, unless such a demand would be futile <span class='parenthetical'>(pointless because the board is biased or complicit)</span>.", link: "https://www.law.cornell.edu/wex/shareholder_derivative_suit" },
                    { name: "General Partnership Formation", percentage: "14.8%", statement: "A general partnership is formed when two or more persons associate as co-owners to carry on a business for profit, regardless of their subjective intent. A sharing of profits from a business is <i>prima facie</i> <span class='parenthetical'>(at first sight)</span> evidence that a partnership exists.", link: "https://www.law.cornell.edu/wex/partnership" },
                    { name: "Partner Duty of Loyalty", percentage: "13.0%", statement: "Partners in a general partnership owe a duty of loyalty to the partnership and the other partners. This duty requires a partner to account for any benefit derived from the partnership's business, to refrain from dealing with the partnership as an adverse party, and to refrain from competing with the partnership.", link: "https://www.law.cornell.edu/wex/duty_of_loyalty" },
                    { name: "Conflict Interest Transactions", percentage: "13.0%", statement: "A conflict of interest transaction between a director and the corporation is a breach of the duty of loyalty unless the transaction is approved by a majority of disinterested directors after full disclosure, approved by a majority of disinterested shareholders after full disclosure, or is fair to the corporation at the time it was authorized.", link: "https://www.law.cornell.edu/wex/conflict_of_interest" },
                    { name: "Piercing the Corporate Veil", percentage: "11.1%", statement: "A court may pierce the corporate veil <span class='parenthetical'>(disregard the corporation's separate legal identity)</span> and hold shareholders personally liable for the corporation's obligations if the plaintiff can show that the corporation is an <i>alter ego</i> <span class='parenthetical'>(a second self)</span> or mere instrumentality <span class='parenthetical'>(a tool)</span> of the shareholder, that the shareholder is using the corporate form to perpetrate a fraud or injustice, and that an inequitable result will occur if the veil is not pierced.", link: "https://www.law.cornell.edu/wex/piercing_the_corporate_veil" }
                ],
                "Civil Procedure": [
                    { name: "Diversity Jurisdiction", percentage: "33.3%", statement: "A federal court has diversity jurisdiction over a civil action where the amount in controversy exceeds $75,000, exclusive of interest and costs, and there is complete diversity of citizenship <span class='parenthetical'>(no plaintiff is a citizen of the same state as any defendant)</span> between the plaintiffs and defendants.", link: "https://www.law.cornell.edu/wex/diversity_jurisdiction" },
                    { name: "Federal Question Jurisdiction", percentage: "20.4%", statement: "Federal courts have subject matter jurisdiction over cases 'arising under' the Constitution, laws, or treaties of the United States.", link: "https://www.law.cornell.edu/wex/federal_question_jurisdiction" },
                    { name: "Citizenship for Diversity Purposes", percentage: "18.5%", statement: "For diversity jurisdiction purposes, an individual is a citizen of the state of their domicile <span class='parenthetical'>(permanent home)</span>. A corporation is a citizen of every state in which it is incorporated and of the one state where it has its principal place of business.", link: "https://www.law.cornell.edu/wex/diversity_jurisdiction" },
                    { name: "Venue", percentage: "14.8%", statement: "Venue <span class='parenthetical'>(the proper geographic district for a lawsuit)</span> in a federal civil action is proper in a judicial district where any defendant resides, if all defendants reside in the same state; a judicial district in which a substantial part of the events or omissions giving rise to the claim occurred; or if neither of the first two apply, any judicial district in which any defendant is subject to the court's personal jurisdiction.", link: "https://www.law.cornell.edu/wex/venue" },
                    { name: "Personal Jurisdiction", percentage: "14.8%", statement: "A court may exercise personal jurisdiction over a defendant if the state's long-arm statute <span class='parenthetical'>(a law giving courts jurisdiction over out-of-state defendants)</span> authorizes it and the exercise of jurisdiction comports <span class='parenthetical'>(agrees with)</span> with the Due Process Clause of the Fourteenth Amendment. Due process requires that the defendant have sufficient minimum contacts with the forum state such that the maintenance of the suit does not offend traditional notions of fair play and substantial justice.", link: "https://www.law.cornell.edu/wex/personal_jurisdiction" },
                    { name: "Supplemental Jurisdiction", percentage: "14.8%", statement: "A federal court with subject matter jurisdiction over a claim may exercise supplemental jurisdiction over other claims that are so related to the original claim that they form part of the same case or controversy.", link: "https://www.law.cornell.edu/wex/supplemental_jurisdiction" },
                    { name: "Specific Jurisdiction", percentage: "13.0%", statement: "Specific personal jurisdiction exists when the cause of action arises out of or relates to the defendant's purposeful contacts with the forum state.", link: "https://www.law.cornell.edu/wex/specific_jurisdiction" },
                    { name: "Motion for Summary Judgment", percentage: "9.3%", statement: "A court will grant a motion for summary judgment if the movant <span class='parenthetical'>(the party making the motion)</span> shows that there is no genuine dispute as to any material fact and the movant is entitled to judgment as a matter of law.", link: "https://www.law.cornell.edu/wex/summary_judgment" },
                    { name: "Change of Venue", percentage: "9.3%", statement: "For the convenience of the parties and witnesses and in the interest of justice, a district court may transfer any civil action to any other district where it might have been brought.", link: "https://www.law.cornell.edu/wex/venue" },
                    { name: "Removal", percentage: "7.4%", statement: "A defendant may remove a case from state court to the federal court for the district in which the state court action is pending if the federal court would have had original subject matter jurisdiction over the action.", link: "https://www.law.cornell.edu/wex/removal" }
                ],
                "Conflict of Laws": [
                    { name: "Collateral Estoppel", percentage: "9.3%", statement: "Collateral estoppel <span class='parenthetical'>(a doctrine preventing an issue from being re-litigated)</span> prevents a party from relitigating an issue that was actually litigated, determined by a valid and final judgment, and was essential to the prior judgment.", link: "https://www.law.cornell.edu/wex/collateral_estoppel" },
                    { name: "Erie Doctrine", percentage: "9.3%", statement: "In a diversity case, a federal court will apply its own procedural law, but must apply the substantive law of the state in which it sits. To determine if a law is substantive or procedural, the court will consider if the state law is outcome-determinative.", link: "https://www.law.cornell.edu/wex/erie_doctrine" },
                    { name: "Choice of Law (COL) Approaches", percentage: "7.4%", statement: "The First Restatement on Conflict of Laws uses a vested rights approach, where the law of the place of the last event necessary to create the cause of action governs. The Second Restatement applies the law of the state with the most significant relationship to the issue. The governmental interest analysis approach applies the law of the forum state unless another state has a greater interest in the outcome.", link: "https://www.law.cornell.edu/wex/choice_of_law" },
                    { name: "Res Judicata", percentage: "5.6%", statement: "<i>Res judicata</i> <span class='parenthetical'>(a doctrine preventing a claim from being re-litigated)</span> bars a party from bringing a subsequent lawsuit on a claim that has been decided on the merits in a prior action between the same parties or their privies <span class='parenthetical'><b><i>(persons with a mutual legal interest)</i></b></span>.", link: "https://www.law.cornell.edu/wex/res_judicata" },
                    { name: "Express COL Clauses in Contracts", percentage: "3.7%", statement: "Parties to a contract may choose the law to govern their contractual rights and duties, provided the choice is not contrary to a fundamental policy of a state which has a materially greater interest than the chosen state in the determination of the particular issue.", link: "https://www.law.cornell.edu/wex/choice_of_law_clause" },
                    { name: "COL: Decedents' Estates", percentage: "3.7%", statement: "The law of the decedent's <span class='parenthetical'>(the deceased person's)</span> domicile at death governs the disposition of personal property, while the law of the <i>situs</i> <span class='parenthetical'>(location)</span> of the property governs the disposition of real property.", link: "https://www.law.cornell.edu/wex/decedents_estates" },
                    { name: "COL: Substance vs. Procedure", percentage: "3.7%", statement: "In choice of law, procedural matters are governed by the law of the forum <span class='parenthetical'>(the court where the suit is brought)</span>, while substantive matters are governed by the law of the state that has the most significant relationship to the issue.", link: "https://www.law.cornell.edu/wex/substantive_law" },
                    { name: "Full Faith and Credit", percentage: "3.7%", statement: "The Full Faith and Credit Clause of the U.S. Constitution requires that a state court give the same effect to a judgment of a sister state's court that the judgment would have in the rendering state, provided the rendering court had jurisdiction.", link: "https://www.law.cornell.edu/wex/full_faith_and_credit_clause" },
                    { name: "COL: Contracts", percentage: "1.9%", statement: "In the absence of an effective choice of law clause, contract disputes are typically governed by the law of the place of contracting or the state with the most significant relationship to the transaction and the parties.", link: "https://www.law.cornell.edu/wex/choice_of_law" },
                    { name: "COL: Torts", percentage: "1.9%", statement: "For tort cases, the traditional rule is to apply the law of the place of the injury. Modern approaches, like the Second Restatement, apply the law of the state with the most significant relationship to the occurrence and the parties.", link: "https://www.law.cornell.edu/wex/choice_of_law" }
                ],
                "Constitutional Law": [
                    { name: "State Action Requirement", percentage: "10.3%", statement: "The protections of the U.S. Constitution generally apply only to government action, not the actions of private individuals or entities, unless the private actor is performing a traditional public function or there is significant state involvement with the private actor's conduct.", link: "https://www.law.cornell.edu/wex/state_action_requirement" },
                    { name: "State Sovereign Immunity", percentage: "6.9%", statement: "The Eleventh Amendment prohibits federal courts from hearing most private actions against state governments. This immunity does not extend to suits against state officials for injunctive relief or to suits where the state has consented to be sued.", link: "https://www.law.cornell.edu/wex/sovereign_immunity" },
                    { name: "Dormant Commerce Clause", percentage: "6.9%", statement: "In the absence of federal regulation, a state or local government may regulate interstate commercial activity, but may not discriminate against or unduly burden interstate commerce.", link: "https://www.law.cornell.edu/wex/dormant_commerce_clause" },
                    { name: "14th Amendment Equal Protection", percentage: "6.9%", statement: "The Equal Protection Clause of the Fourteenth Amendment prohibits states from denying any person within their jurisdiction the equal protection of the laws. Government classifications that treat similarly situated people differently are subject to different levels of scrutiny <span class='parenthetical'>(standards of judicial review)</span> depending on the classification and the rights involved.", link: "https://www.law.cornell.edu/wex/equal_protection" },
                    { name: "1st Amendment Free Speech", percentage: "6.9%", statement: "The First Amendment protects freedom of speech, but this protection is not absolute. The government may regulate speech based on its content only if the regulation is necessary to achieve a compelling government interest. Content-neutral regulations of the time, place, and manner of speech are subject to intermediate scrutiny.", link: "https://www.law.cornell.edu/wex/freedom_of_speech" },
                    { name: "Time, Place, & Manner Restrictions", percentage: "6.9%", statement: "The government may impose reasonable restrictions on the time, place, and manner of speech in a public forum, provided the restrictions are content-neutral, narrowly tailored to serve a significant government interest, and leave open ample alternative channels for communication.", link: "https://www.law.cornell.edu/wex/time_place_and_manner_regulation" },
                    { name: "Unprotected Speech", percentage: "6.9%", statement: "Certain categories of speech receive no First Amendment protection, including speech that incites imminent lawless action, fighting words, defamation, and obscenity.", link: "https://www.law.cornell.edu/wex/unprotected_speech" },
                    { name: "Exclusive State Powers", percentage: "6.9%", statement: "The Tenth Amendment reserves to the states powers not delegated to the federal government by the Constitution, nor prohibited by it to the states.", link: "https://www.law.cornell.edu/wex/tenth_amendment" },
                    { name: "Commerce Power", percentage: "6.9%", statement: "Congress has the power to regulate the channels and instrumentalities of interstate commerce, persons and things in interstate commerce, and activities that have a substantial effect on interstate commerce.", link: "https://www.law.cornell.edu/wex/commerce_clause" },
                    { name: "Takings Clause (Eminent Domain)", percentage: "3.4%", statement: "The Fifth Amendment's Takings Clause, applicable to the states through the Fourteenth Amendment, prohibits the government from taking private property for public use without just compensation.", link: "https://www.law.cornell.edu/wex/takings" }
                ],
                "Contracts": [
                    { name: "Common Law vs. UCC", percentage: "41.4%", statement: "The Uniform Commercial Code (UCC) governs contracts for the sale of goods. The common law governs all other types of contracts, including those for services and real estate.", link: "https://www.law.cornell.edu/wex/uniform_commercial_code_ucc" },
                    { name: "Requirements to Form a Contract", percentage: "27.6%", statement: "A valid contract requires an offer, acceptance, and consideration.", link: "https://www.law.cornell.edu/wex/contract" },
                    { name: "Expectation Damages", percentage: "17.2%", statement: "Expectation damages are the standard measure of damages for breach of contract and are intended to put the non-breaching party in the same position they would have been in had the contract been fully performed.", link: "https://www.law.cornell.edu/wex/damages" },
                    { name: "Terminating the Offer", percentage: "13.8%", statement: "An offer may be terminated by the offeror's revocation, the offeree's rejection or counteroffer, the lapse of time, or the death or incapacity of either party.", link: "https://www.law.cornell.edu/wex/offer" },
                    { name: "The Offer", percentage: "10.3%", statement: "An offer is a manifestation of a present intent to contract, communicated to an identified offeree, containing definite and certain terms.", link: "https://www.law.cornell.edu/wex/offer" },
                    { name: "Terms Required in the Offer", percentage: "10.3%", statement: "Under the common law, an offer must contain all essential terms, including the parties, subject matter, price, and quantity. Under the UCC, the only essential term is quantity.", link: "https://www.law.cornell.edu/wex/offer" },
                    { name: "Acceptance", percentage: "10.3%", statement: "Acceptance is a manifestation of assent to the terms of the offer in the manner prescribed or authorized by the offer.", link: "https://www.law.cornell.edu/wex/acceptance" },
                    { name: "Contract Modification", percentage: "10.3%", statement: "At common law, a modification of a contract requires new consideration. Under the UCC, an agreement modifying a contract for the sale of goods needs no consideration to be binding, but must be made in good faith.", link: "https://www.law.cornell.edu/wex/contract_modification" },
                    { name: "Mirror Image Rule & UCC 2-207", percentage: "10.3%", statement: "Under the common law's mirror image rule, the acceptance must be a mirror image of the offer. UCC § 2-207 provides that for the sale of goods, an acceptance with additional or different terms is still an acceptance, and the new terms may become part of the contract depending on whether the parties are merchants.", link: "https://www.law.cornell.edu/wex/mirror_image_rule" },
                    { name: "Anticipatory Repudiation", percentage: "10.3%", statement: "Anticipatory repudiation occurs when a party to a contract, prior to the time set for performance, unequivocally indicates that he will not perform when the time comes. The non-repudiating party may sue for damages immediately, wait to sue, treat the contract as discharged, or urge the other party to perform.", link: "https://www.law.cornell.edu/wex/anticipatory_repudiation" }
                ],
                "Criminal Law & Procedure": [
                    { name: "Mental State Requirements", percentage: "17.2%", statement: "For a conviction, the prosecution must prove that the defendant had the requisite mental state, or <i>mens rea</i> <span class='parenthetical'>(guilty mind)</span>, for the crime. The common law mental states are specific intent, general intent, and malice. The Model Penal Code proposes four mental states: purposely, knowingly, recklessly, and negligently.", link: "https://www.law.cornell.edu/wex/mens_rea" },
                    { name: "Miranda Analysis", percentage: "17.2%", statement: "Law enforcement officers must provide Miranda warnings to a suspect before engaging in a custodial interrogation <span class='parenthetical'>(questioning after being taken into custody)</span>. A suspect is in custody if a reasonable person would not feel free to leave. An interrogation is any conduct by the police that they should know is reasonably likely to elicit an incriminating response.", link: "https://www.law.cornell.edu/wex/miranda_warnings" },
                    { name: "4th Amendment Searches", percentage: "13.8%", statement: "A search for Fourth Amendment purposes occurs when the government intrudes upon a person's reasonable expectation of privacy or physically intrudes upon a constitutionally protected area. A search is generally unreasonable if it is conducted without a warrant.", link: "https://www.law.cornell.edu/wex/fourth_amendment" },
                    { name: "Larceny/Embezzlement", percentage: "10.3%", statement: "Larceny is the trespassory <span class='parenthetical'>(wrongful)</span> taking and carrying away of the personal property of another with the intent to permanently deprive the owner thereof. Embezzlement is the fraudulent conversion of the property of another by one who is in lawful possession of the property.", link: "https://www.law.cornell.edu/wex/larceny" },
                    { name: "Common Law Murder", percentage: "6.9%", statement: "Common law murder is the unlawful killing of a human being with malice aforethought <span class='parenthetical'>(the intent to kill or cause serious harm)</span>. Malice can be established by showing an intent to kill, an intent to inflict great bodily injury, a reckless indifference to an unjustifiably high risk to human life <span class='parenthetical'>(a 'depraved heart')</span>, or an intent to commit a felony <span class='parenthetical'>(felony murder)</span>.", link: "https://www.law.cornell.edu/wex/homicide" },
                    { name: "Voluntary Manslaughter", percentage: "6.9%", statement: "Voluntary manslaughter is an intentional killing committed in the heat of passion upon adequate provocation.", link: "https://www.law.cornell.edu/wex/voluntary_manslaughter" },
                    { name: "Involuntary Manslaughter", percentage: "6.9%", statement: "Involuntary manslaughter is an unintentional killing committed with criminal negligence or during the commission of an unlawful act that is not a felony.", link: "https://www.law.cornell.edu/wex/involuntary_manslaughter" },
                    { name: "1st & 2nd Degree Murder", percentage: "6.9%", statement: "First-degree murder is typically defined as a deliberate and premeditated killing or a killing that occurs during the commission of an inherently dangerous felony. Second-degree murder is a killing with malice aforethought that does not qualify as first-degree murder.", link: "https://www.law.cornell.edu/wex/homicide" },
                    { name: "Felony Murder Rule", percentage: "6.9%", statement: "The felony murder rule provides that a person is guilty of murder if a death results from the commission of an inherently dangerous felony.", link: "https://www.law.cornell.edu/wex/felony_murder_rule" },
                    { name: "Causation in Homicide", percentage: "6.9%", statement: "The defendant's act must be both the actual cause <span class='parenthetical'>(but-for cause)</span> and the proximate cause of the victim's death. Proximate cause is a legal determination that the defendant should be held criminally responsible for the death.", link: "https://www.law.cornell.edu/wex/causation" }
                ],
                "Evidence": [
                    { name: "Hearsay", percentage: "34.5%", statement: "Hearsay is an out-of-court statement offered in evidence to prove the truth of the matter asserted. It is generally inadmissible unless it falls under an exception or exclusion.", link: "https://www.law.cornell.edu/wex/hearsay" },
                    { name: "Non-Hearsay", percentage: "34.5%", statement: "Statements that are not offered to prove the truth of the matter asserted are not hearsay. This includes statements offered to show their effect on the listener, legally operative facts, and circumstantial evidence of the declarant's <span class='parenthetical'>(the person who made the statement)</span> state of mind.", link: "https://www.law.cornell.edu/wex/hearsay" },
                    { name: "Logical Relevance", percentage: "27.6%", statement: "Evidence is relevant if it has any tendency to make a fact of consequence to the determination of the action more or less probable than it would be without the evidence.", link: "https://www.law.cornell.edu/wex/relevance" },
                    { name: "Character Evidence", percentage: "24.1%", statement: "Evidence of a person's character or character trait is generally inadmissible to prove that on a particular occasion the person acted in accordance with the character or trait. However, there are exceptions in criminal cases and when character is an essential element of a charge, claim, or defense.", link: "https://www.law.cornell.edu/wex/character_evidence" },
                    { name: "M.I.M.I.C.", percentage: "24.1%", statement: "Evidence of a defendant's prior bad acts or crimes is not admissible to prove the defendant's character in order to show action in conformity therewith. However, such evidence may be admissible for other purposes, such as to prove Motive, Intent, absence of Mistake, Identity, or Common plan or scheme.", link: "https://www.law.cornell.edu/wex/character_evidence" },
                    { name: "Unavailability Requirement", percentage: "10.3%", statement: "Certain hearsay exceptions require the declarant to be unavailable to testify, such as former testimony, statements against interest, and dying declarations. A declarant is unavailable if they are exempt from testifying due to privilege, refuse to testify, testify to not remembering the subject matter, cannot be present due to death or illness, or are absent from the hearing and the proponent has been unable to procure their attendance.", link: "https://www.law.cornell.edu/wex/declarant_unavailable" },
                    { name: "Present Sense Impression", percentage: "10.3%", statement: "A statement describing or explaining an event or condition made while the declarant was perceiving the event or condition, or immediately thereafter, is an exception to the hearsay rule.", link: "https://www.law.cornell.edu/wex/present_sense_impression" },
                    { name: "Excited Utterance", percentage: "10.3%", statement: "A statement relating to a startling event or condition, made while the declarant was under the stress of excitement that it caused, is an exception to the hearsay rule.", link: "https://www.law.cornell.edu/wex/excited_utterance" },
                    { name: "Medical Diagnosis or Treatment", percentage: "10.3%", statement: "A statement made for—and reasonably pertinent to—medical diagnosis or treatment and describing medical history, or past or present symptoms, pain, or sensations, or the inception or general character of the cause or external source thereof, is an exception to the hearsay rule.", link: "https://www.law.cornell.edu/wex/statements_for_purposes_of_medical_diagnosis_or_treatment" },
                    { name: "Impeachment", percentage: "6.9%", statement: "A witness's credibility may be attacked, or impeached <span class='parenthetical'>(discredited)</span>, by various means, including showing bias, prior inconsistent statements, bad character for truthfulness, or sensory defects.", link: "https://www.law.cornell.edu/wex/impeachment" }
                ],
                "Family Law": [
                    { name: "Property Division at Divorce", percentage: "22.2%", statement: "Most states follow the principle of equitable distribution <span class='parenthetical'>(a fair, but not necessarily equal, division of marital property)</span>. Marital property is generally defined as all property acquired by either spouse during the marriage. Separate property, such as property owned before the marriage or acquired by gift or inheritance, is not subject to division.", link: "https://www.law.cornell.edu/wex/equitable_distribution" },
                    { name: "Child Custody: Best Interests", percentage: "16.7%", statement: "In making a determination of child custody, the court's primary consideration is the best interests of the child. Factors considered include the wishes of the parents, the wishes of the child <span class='parenthetical'>(if of sufficient age and maturity)</span>, the interaction of the child with parents and siblings, the child's adjustment to home, school, and community, and the mental and physical health of all individuals involved.", link: "https://www.law.cornell.edu/wex/best_interests_of_the_child" },
                    { name: "Premarital Contracts", percentage: "13.0%", statement: "A premarital <span class='parenthetical'>(or antenuptial)</span> agreement is a contract entered into by prospective spouses in contemplation of marriage. It is enforceable if it is in writing, signed by both parties, and entered into voluntarily after full and fair disclosure of each party's assets.", link: "https://www.law.cornell.edu/wex/premarital_agreement" },
                    { name: "Marital Action Jurisdiction", percentage: "13.0%", statement: "For a court to have jurisdiction to grant a divorce, at least one of the spouses must be domiciled in the state. For a court to have jurisdiction to divide marital property or order spousal support, it must have personal jurisdiction over the defendant spouse.", link: "https://www.law.cornell.edu/wex/divorce" },
                    { name: "Common Law Marriage", percentage: "9.3%", statement: "A common law marriage is established when a couple holds themselves out to the public as married, cohabitates, and has the present intent to be married.", link: "https://www.law.cornell.edu/wex/common_law_marriage" },
                    { name: "Modification of Child Support", percentage: "9.3%", statement: "A child support order may be modified upon a showing of a substantial and continuing change in circumstances that makes the original order unreasonable.", link: "https://www.law.cornell.edu/wex/child_support" },
                    { name: "Modification of Child Custody", percentage: "9.3%", statement: "A child custody order may be modified only upon a showing of a substantial and material change in circumstances, and the modification must be in the best interests of the child.", link: "https://www.law.cornell.edu/wex/child_custody" },
                    { name: "Modification of Spousal Support", percentage: "5.6%", statement: "A spousal support order may be modified upon a showing of a substantial and material change in circumstances. Some states do not permit modification of spousal support if the original decree does not so provide.", link: "https://www.law.cornell.edu/wex/alimony" },
                    { name: "Child Support Calculation", percentage: "5.6%", statement: "States have adopted guidelines for calculating child support, which are typically based on the income of the parents and the number of children. The court may deviate from the guidelines if application would be unjust or inappropriate.", link: "https://www.law.cornell.edu/wex/child_support" },
                    { name: "Establishing Paternity/Legitimation", percentage: "5.6%", statement: "A child born to a married woman is presumed to be the child of her husband. Paternity of a child born to an unmarried woman may be established by acknowledgment of the father or by a court proceeding.", link: "https://www.law.cornell.edu/wex/paternity" }
                ],
                "Real Property": [
                    { name: "Deed Types & Merger", percentage: "10.3%", statement: "The three main types of deeds are the general warranty deed, the special warranty deed, and the quitclaim deed. Under the doctrine of merger <span class='parenthetical'>(absorption of one thing into another)</span>, the contract for the sale of land merges into the deed at closing, and the buyer's rights are thereafter governed by the deed, not the contract.", link: "https://www.law.cornell.edu/wex/deed" },
                    { name: "Recording Statutes & Notice", percentage: "10.3%", statement: "Recording statutes determine the priority of competing interests in real property. A notice statute protects a subsequent <i>bona fide</i> purchaser for value who takes without notice of a prior interest. A race-notice statute protects a subsequent <i>bona fide</i> purchaser for value who takes without notice and records first. A race statute protects a subsequent purchaser who records first, regardless of notice.", link: "https://www.law.cornell.edu/wex/recording_statute" },
                    { name: "Leasehold Interest", percentage: "6.9%", statement: "A leasehold is an estate in land under which the tenant has a present possessory interest in the leased premises and the landlord has a future interest <span class='parenthetical'>(a reversion)</span>. The main types of leaseholds are the tenancy for years, the periodic tenancy, the tenancy at will, and the tenancy at sufferance.", link: "https://www.law.cornell.edu/wex/leasehold" },
                    { name: "Assignments", percentage: "6.9%", statement: "An assignment is the transfer by a tenant of their entire remaining interest in the lease. The assignee is in <i>privity of estate</i> <span class='parenthetical'>(a legal relationship based on a common interest in the same property)</span> with the landlord and is liable for the covenants in the original lease that run with the land.", link: "https://www.law.cornell.edu/wex/assignment" },
                    { name: "Abandonment", percentage: "6.9%", statement: "If a tenant abandons the leased premises, the landlord may accept the surrender and terminate the lease, or re-let the premises on the tenant's behalf and hold the tenant liable for any deficiency.", link: "https://www.law.cornell.edu/wex/abandonment" },
                    { name: "Duty to Mitigate", percentage: "6.9%", statement: "In a majority of states, a landlord has a duty to mitigate damages by making reasonable efforts to re-let the premises if a tenant abandons.", link: "https://www.law.cornell.edu/wex/mitigation_of_damages" },
                    { name: "Termination of an Easement", percentage: "6.9%", statement: "An easement may be terminated by estoppel, necessity, destruction of the servient tenement <span class='parenthetical'><b><i>(the burdened land)</i></b></span>, condemnation <span class='parenthetical'><b><i>(government taking)</i></b></span>, release, abandonment, merger, or prescription <span class='parenthetical'><b><i>(adverse use over time)</i></b></span>.", link: "https://www.law.cornell.edu/wex/easement" },
                    { name: "Implied Warranty Fitness/Suitability", percentage: "6.9%", statement: "In most jurisdictions, a builder of a new home impliedly warrants that the home is fit for its intended purpose and constructed in a workmanlike manner.", link: "https://www.law.cornell.edu/wex/implied_warranty_of_fitness_for_a_particular_purpose" },
                    { name: "Adverse Possession", percentage: "6.9%", statement: "A person can acquire title to real property by adverse possession if their possession is continuous, open and notorious, actual, and hostile for the statutory period.", link: "https://www.law.cornell.edu/wex/adverse_possession" },
                    { name: "Shelter Rule", percentage: "6.9%", statement: "A person who takes real property from a <i>bona fide</i> purchaser <span class='parenthetical'><b><i>(one who buys in good faith)</i></b></span> will prevail against any interest that the transferor-<i>bona fide</i> purchaser would have prevailed against. This is true even if the person taking the property had notice of the prior interest.", link: "https://www.law.cornell.edu/wex/shelter_rule" }
                ],
                "Torts": [
                    { name: "Negligence Elements", percentage: "41.4%", statement: "To establish a <i>prima facie</i> <span class='parenthetical'>(on its face)</span> case for negligence, a plaintiff must prove that the defendant owed a duty of care to the plaintiff, the defendant breached that duty, the breach was the actual and proximate cause of the plaintiff's injury, and the plaintiff suffered damages.", link: "https://www.law.cornell.edu/wex/negligence" },
                    { name: "Respondeat Superior", percentage: "27.6%", statement: "Under the doctrine of <i>respondeat superior</i> <span class='parenthetical'><b><i>(let the master answer)</i></b></span>, an employer is vicariously liable for the torts of an employee committed within the scope of employment.", link: "https://www.law.cornell.edu/wex/respondeat_superior" },
                    { name: "The Reasonable Person Standard", percentage: "13.8%", statement: "In a negligence action, the defendant's conduct is measured against the standard of a reasonably prudent person under the same or similar circumstances.", link: "https://www.law.cornell.edu/wex/reasonable_person" },
                    { name: "Strict Liability", percentage: "13.8%", statement: "A defendant is strictly liable for injuries caused by an abnormally dangerous activity or by a wild animal. In a products liability case, a manufacturer, distributor, or seller of a defective product is strictly liable for harm caused by the defect.", link: "https://www.law.cornell.edu/wex/strict_liability" },
                    { name: "Negligence Per Se", percentage: "13.8%", statement: "An unexcused violation of a statute that establishes a specific standard of care constitutes <i>negligence per se</i> <span class='parenthetical'><b><i>(negligence in itself)</i></b></span> if the plaintiff is within the class of persons intended to be protected by the statute and the harm is of the type the statute was intended to prevent.", link: "https://www.law.cornell.edu/wex/negligence_per_se" },
                    { name: "Actual & Proximate Cause", percentage: "13.8%", statement: "Actual cause, or cause-in-fact, is established if the plaintiff's injury would not have occurred but for the defendant's negligent conduct. Proximate cause, or legal cause, requires that the plaintiff's injury was a foreseeable result of the defendant's negligent conduct.", link: "https://www.law.cornell.edu/wex/causation" },
                    { name: "Eggshell Plaintiff Rule", percentage: "10.3%", statement: "A defendant is liable for all harm that the plaintiff suffers as a result of the defendant's tortious conduct, even if the plaintiff suffers from a pre-existing condition that makes the harm greater than a normal person would have suffered.", link: "https://www.law.cornell.edu/wex/eggshell_skull_rule" },
                    { name: "Defective Products", percentage: "10.3%", statement: "A product may be defective due to a flaw in its manufacturing, a defective design, or an inadequate warning.", link: "https://www.law.cornell.edu/wex/products_liability" },
                    { name: "Comparative Fault", percentage: "10.3%", statement: "In a comparative fault jurisdiction, the plaintiff's recovery is reduced by the percentage of their own negligence. In a modified comparative fault jurisdiction, the plaintiff's recovery is barred if their negligence exceeds a certain threshold (usually 50%).", link: "https://www.law.cornell.edu/wex/comparative_negligence" },
                    { name: "Affirmative Duty to Act", percentage: "10.3%", statement: "Generally, there is no affirmative duty to act to help a person in peril. However, such a duty may arise from a special relationship between the parties, or when the defendant created the danger.", link: "https://www.law.cornell.edu/wex/duty" }
                ],
                "Trusts & Estates": [
                    { name: "Intestate Succession", percentage: "18.5%", statement: "When a person dies without a will, their property passes to their heirs according to the state's intestacy statute <span class='parenthetical'><b><i>(laws for people who die without a will)</i></b></span>. The surviving spouse and descendants are typically the primary beneficiaries.", link: "https://www.law.cornell.edu/wex/intestacy" },
                    { name: "Incorporation by Reference", percentage: "16.7%", statement: "A writing that is not executed with the formalities of a will may be incorporated by reference into a will if the writing was in existence at the time the will was executed, the will manifests an intent to incorporate the document, and the will describes the document with sufficient certainty to permit its identification.", link: "https://www.law.cornell.edu/wex/incorporation_by_reference" },
                    { name: "Duty of Care", percentage: "14.8%", statement: "The trustee of a trust owes a duty to the beneficiaries to administer the trust with the care, skill, and caution of a reasonably prudent person.", link: "https://www.law.cornell.edu/wex/trust" },
                    { name: "Devises to Classes", percentage: "14.8%", statement: "A class gift is a gift to a group of persons, uncertain in number at the time of the gift, to be ascertained at a future time, who are all to take in equal or in some other definite proportions, the share of each being dependent for its amount upon the ultimate number of persons.", link: "https://www.law.cornell.edu/wex/class_gift" },
                    { name: "Creation of Express Trusts", percentage: "13.0%", statement: "An express trust is created by the settlor's <span class='parenthetical'><b><i>(the person creating the trust)</i></b></span> intent to create a trust, a trustee, a definite beneficiary, and trust property. The settlor must have capacity to create a trust.", link: "https://www.law.cornell.edu/wex/express_trust" },
                    { name: "Judicial Modification of Trusts", percentage: "13.0%", statement: "A court may modify or terminate a trust if, because of circumstances not anticipated by the settlor, modification or termination will further the purposes of the trust.", link: "https://www.law.cornell.edu/wex/trust" },
                    { name: "Lapsed Legacies", percentage: "13.0%", statement: "Under the common law, if a beneficiary predeceases the testator <span class='parenthetical'><b><i>(the will-maker)</i></b></span>, the gift to the beneficiary lapses <span class='parenthetical'><b><i>(fails)</i></b></span> and passes to the residuary estate. Most states have anti-lapse statutes that save the gift for the descendants of the predeceased beneficiary if the beneficiary was a relative of the testator.", link: "https://www.law.cornell.edu/wex/lapsed_gift" },
                    { name: "Revocation of Will by Physical Act", percentage: "13.0%", statement: "A will may be revoked by a physical act, such as burning, tearing, canceling, or obliterating, done by the testator with the intent to revoke the will.", link: "https://www.law.cornell.edu/wex/will" },
                    { name: "Will Execution Requirements", percentage: "11.1%", statement: "A will must be in writing, signed by the testator, and attested to by at least two credible witnesses in the testator's presence.", link: "https://www.law.cornell.edu/wex/will" },
                    { name: "Rule Against Perpetuities", percentage: "11.1%", statement: "The Rule Against Perpetuities <span class='parenthetical'><b><i>(a complex rule preventing property interests from being tied up for too long)</i></b></span> provides that no interest is good unless it must vest, if at all, not later than 21 years after some life in being at the creation of the interest. Many states have modified or abolished the common law rule.", link: "https://www.law.cornell.edu/wex/rule_against_perpetuities" }
                ],
                "UCC Secured Transactions": [
                    { name: "Scope of Article 9", percentage: "63.0%", statement: "Article 9 of the Uniform Commercial Code governs security interests in personal property.", link: "https://www.law.cornell.edu/wex/ucc_article_9_secured_transactions" },
                    { name: "Attachment of the Security Interest", percentage: "51.9%", statement: "A security interest attaches <span class='parenthetical'><b><i>(becomes enforceable)</i></b></span> to collateral and becomes enforceable against the debtor when there is a security agreement, the secured party has given value, and the debtor has rights in the collateral.", link: "https://www.law.cornell.edu/wex/attachment" },
                    { name: "Perfection of the Security Interest", percentage: "50.0%", statement: "Perfection of a security interest establishes the secured party's rights in the collateral as against third parties. A security interest is typically perfected by filing a financing statement, but may also be perfected by possession or control of the collateral, or automatically in certain situations.", link: "https://www.law.cornell.edu/wex/perfection" },
                    { name: "Purchase-Money Security Interest", percentage: "22.2%", statement: "A PMSI <span class='parenthetical'><b><i>(Purchase-Money Security Interest)</i></b></span> is a special type of security interest that has priority over other security interests in the same collateral. A PMSI arises when a creditor sells goods to a debtor on credit, retaining a security interest in the goods, or when a creditor advances funds to a debtor to purchase goods, and the creditor takes a security interest in those goods.", link: "https://www.law.cornell.edu/wex/purchase_money_security_interest" },
                    { name: "Perfected vs. Unperfected Interests", percentage: "22.2%", statement: "A perfected security interest has priority over an unperfected security interest.", link: "https://www.law.cornell.edu/wex/priority" },
                    { name: "Multiple Perfected Creditors", percentage: "20.4%", statement: "As between two perfected secured creditors, the first to file a financing statement or to perfect their security interest has priority.", link: "https://www.law.cornell.edu/wex/priority" },
                    { name: "Buyers in the Ordinary Course of Biz", percentage: "16.7%", statement: "A buyer in the ordinary course of business takes free of a security interest created by the seller, even if the security interest is perfected and the buyer knows of its existence.", link: "https://www.law.cornell.edu/wex/buyer_in_ordinary_course_of_business" },
