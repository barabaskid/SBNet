            layoutMode: 'fitRows',
            getSortData: {

                artist: '[data-artist]',
                title: '[data-title]'

        });

            $grid.isotope({ sortBy: sortByValue });

            $(this).addClass('active');
        });

            gallery: { enabled: true },
